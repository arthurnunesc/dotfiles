add_newline = true

[username]
show_always = true
style_user = "bold blue"
format = '[$user]($style) '

[os]
disabled = true

[character]
success_symbol = "[>](bold green)"
error_symbol = "[x](bold red)"
vimcmd_symbol = "[v](bold green)"

[git_commit]
tag_symbol = " tag "

# [git_status]
# ahead = ">"
# behind = "<"
# diverged = "<>"
# renamed = "r"
# deleted = "x"

[aws]
symbol = "  "

[buf]
symbol = " "

[c]
symbol = " "

[conda]
symbol = " "

[cmake]
format = "via [$symbol]($style)"

[dart]
symbol = " "
format = "via [$symbol]($style)"

[directory]
read_only = " "
format = "in [$path]($style)[$read_only]($read_only_style) "

[docker_context]
symbol = " "

[fossil_branch]
symbol = " "
  
[git_branch]
symbol = " "
# format = "on ($symbol)[$branch]($style) "

